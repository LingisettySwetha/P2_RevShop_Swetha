<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Reset Password - RevShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--bg-main) 100%);
        }

        .auth-card {
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 520px;
            padding: 3rem;
        }
    </style>
</head>

<body>
<div class="auth-container">
    <div class="auth-card">
        <h2 class="fw-bold mb-2">Reset Password</h2>
        <p class="text-muted small mb-4">Set a new password for your account.</p>

        <div th:if="${error}" class="alert alert-danger py-2 px-3 small" th:text="${error}"></div>

        <form action="/reset-password" method="post">
            <input type="hidden" name="token" th:value="${token}">
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" name="newPassword" class="form-input" minlength="4" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirmPassword" class="form-input" minlength="4" required>
            </div>
            <button type="submit" class="btn-premium w-100 py-3">Reset Password</button>
        </form>
    </div>
</div>
</body>

</html>
