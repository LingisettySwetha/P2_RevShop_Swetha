<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Dashboard - RevShop</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .dashboard-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
            flex-shrink: 0;
            position: sticky;
            top: 72px;
            height: calc(100vh - 72px);
        }

        .main-content {
            flex-grow: 1;
            padding: 3rem;
            background: var(--bg-main);
        }

        .nav-link-custom {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 10px;
            transition: var(--transition);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .nav-link-custom:hover,
        .nav-link-custom.active {
            background: var(--primary-light);
            color: var(--primary);
        }

        .stat-card {
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            padding: 2rem;
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
            margin-top: 0.5rem;
        }
    </style>
</head>

<body style="background: var(--bg-main);">
    <div th:replace="navbar :: navbar"></div>

    <div class="dashboard-wrapper">
        
        <aside class="sidebar d-none d-lg-block">
            <div class="mb-5 px-3">
                <h6 class="text-muted small fw-bold text-uppercase mb-4">Administration</h6>
                <nav>
                    <a th:href="@{/admin/dashboard}" class="nav-link-custom active">
                        <span>📊</span> Overview
                    </a>
                    <a th:href="@{/admin/products}" class="nav-link-custom">
                        <span>📦</span> All Products
                    </a>
                    <a th:href="@{/admin/categories}" class="nav-link-custom">
                        <span>📂</span> Categories
                    </a>
                </nav>
            </div>
        </aside>

        
        <main class="main-content">
            <header class="mb-5">
                <h1 class="fw-bold mb-1">Admin Dashboard</h1>
                <p class="text-muted mb-0">Platform overview and management console</p>
            </header>

            
            <div class="row g-4 mb-5">
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="text-muted small fw-600 text-uppercase">Total Users</div>
                        <div class="stat-value" th:text="${users}">0</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="text-muted small fw-600 text-uppercase">Total Products</div>
                        <div class="stat-value" th:text="${products}">0</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="text-muted small fw-600 text-uppercase">Total Orders</div>
                        <div class="stat-value" th:text="${orders}">0</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="text-muted small fw-600 text-uppercase">Revenue</div>
                        <div class="stat-value text-primary" th:text="${'₹' + revenue}">₹0</div>
                    </div>
                </div>
            </div>

            <div class="card-white" style="padding: 2.5rem;">
                <h5 class="fw-bold mb-4">Quick Actions</h5>
                <div class="row g-3">
                    <div class="col-md-4">
                        <a th:href="@{/admin/products}"
                            class="btn-premium w-100 py-3 d-flex align-items-center justify-content-center gap-2">
                            <span>📦</span> Manage All Products
                        </a>
                    </div>
                    <div class="col-md-4">
                        <a th:href="@{/admin/categories}"
                            class="btn-ghost w-100 py-3 d-flex align-items-center justify-content-center gap-2">
                            <span>📂</span> Manage Categories
                        </a>
                    </div>
                    <div class="col-md-4">
                        <a href="/products"
                            class="btn-ghost w-100 py-3 d-flex align-items-center justify-content-center gap-2">
                            <span>🛒</span> Browse Marketplace
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
