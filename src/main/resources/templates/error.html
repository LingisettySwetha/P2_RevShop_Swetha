<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Error - RevShop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container text-center mt-5">

    <div class="card shadow p-5" style="border-radius: var(--radius-lg);">
        <h2 class="text-danger fw-bold">⚠ Something Went Wrong</h2>

        <div class="my-4 py-3 px-4 bg-light rounded-3 text-start">
            <p class="mb-1 text-muted small text-uppercase fw-bold">Error Status</p>
            <h4 class="fw-bold mb-3" th:text="${status + ' ' + error}">500 Internal Server Error</h4>

            <p class="mb-1 text-muted small text-uppercase fw-bold">Message</p>
            <p class="mb-0 text-main" th:text="${message}">An unexpected error occurred while processing your request.
            </p>
        </div>

        <div class="d-flex gap-2 justify-content-center">
            <a href="/" class="btn btn-primary px-4 py-2">Go To Home</a>
            <button onclick="window.history.back()" class="btn btn-outline-secondary px-4 py-2">Go Back</button>
        </div>
    </div>

</body>

</html>
