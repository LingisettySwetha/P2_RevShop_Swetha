<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Orders - RevShop</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .order-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 2rem;
            margin-bottom: 2rem;
            transition: var(--transition);
        }

        .order-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }

        .tracking-stepper {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin: 2rem 0;
        }

        .tracking-stepper::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: #e2e8f0;
            transform: translateY(-50%);
            z-index: 1;
        }

        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            border: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .step.active {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
            box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.1);
        }

        .step.completed {
            background: #10b981;
            border-color: #10b981;
            color: white;
        }

        .step-label {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
        }
    </style>
</head>

<body style="background: var(--bg-main);">
    <div th:replace="navbar :: navbar"></div>

    <main class="container" style="padding: 4rem 1rem; max-width: 900px;">
        <div class="mb-4">
            <a th:href="@{/products}" class="text-decoration-none text-muted small fw-bold">
                &larr; Back to Shopping
            </a>
        </div>

        <header class="mb-5">
            <h1 class="fw-bold mb-1">My Orders</h1>
            <p class="text-muted mb-0">Track your purchases and view order history</p>
        </header>

        <div th:if="${orders == null or #lists.isEmpty(orders)}" class="card-white text-center py-5">
            <div style="font-size: 3rem; margin-bottom: 1rem;">[]</div>
            <h3 class="text-muted">No orders yet</h3>
            <p class="text-muted mb-4">You have not placed any orders yet.</p>
            <a href="/products" class="btn-premium">Start Shopping</a>
        </div>

        <div th:each="o : ${orders}" class="order-card"
            th:with="status=${o.orderStatus != null ? o.orderStatus.name() : 'CONFIRMED'}">

            <div class="d-flex justify-content-between align-items-start mb-4">
                <div>
                    <div class="text-muted small fw-600 mb-1"
                        th:text="${'ORDER ' + (o.orderNumber != null ? o.orderNumber : o.orderId)}">ORDER</div>
                    <h5 class="fw-800 mb-0" th:text="${'Rs ' + (o.totalAmount != null ? o.totalAmount : '0.00')}">Amount</h5>
                    <div class="text-muted tiny"
                        th:text="${o.orderDate != null ? 'Placed on ' + o.orderDate : 'Date unavailable'}">Date</div>
                </div>
                <div class="text-end">
                    <span class="alert-badge"
                        th:classappend="${status == 'DELIVERED'} ? ' badge-success' : (${status == 'CANCELLED'} ? ' badge-danger' : (${status == 'SHIPPED'} ? ' badge-primary' : ' badge-warning'))"
                        th:text="${status}">Status</span>
                </div>
            </div>

            <div th:if="${status != 'CANCELLED'}" class="tracking-stepper">
                <div class="position-relative">
                    <div class="step"
                        th:classappend="${status == 'PLACED' or status == 'CONFIRMED' or status == 'SHIPPED' or status == 'DELIVERED'} ? ' completed' : ''">
                        <span th:if="${status == 'PLACED' or status == 'CONFIRMED' or status == 'SHIPPED' or status == 'DELIVERED'}">&#10003;</span>
                        <div class="step-label">Placed</div>
                    </div>
                </div>

                <div class="position-relative">
                    <div class="step"
                        th:classappend="${status == 'CONFIRMED' or status == 'SHIPPED' or status == 'DELIVERED'} ? ' completed' : (${status == 'PLACED'} ? ' active' : '')">
                        <span th:if="${status == 'CONFIRMED' or status == 'SHIPPED' or status == 'DELIVERED'}">&#10003;</span>
                        <div class="step-label">Confirmed</div>
                    </div>
                </div>

                <div class="position-relative">
                    <div class="step"
                        th:classappend="${status == 'SHIPPED' or status == 'DELIVERED'} ? ' completed' : (${status == 'CONFIRMED'} ? ' active' : '')">
                        <span th:if="${status == 'SHIPPED' or status == 'DELIVERED'}">&#10003;</span>
                        <div class="step-label">Shipped</div>
                    </div>
                </div>

                <div class="position-relative">
                    <div class="step"
                        th:classappend="${status == 'DELIVERED'} ? ' completed' : (${status == 'SHIPPED'} ? ' active' : '')">
                        <span th:if="${status == 'DELIVERED'}">&#10003;</span>
                        <div class="step-label">Delivered</div>
                    </div>
                </div>
            </div>

            <div class="mt-3 p-3" style="background: #f8fafc; border-radius: 10px;" th:if="${o.payment != null}">
                <div class="small text-muted fw-bold mb-2">Payment</div>
                <div class="small">
                    <span class="fw-600">Method:</span>
                    <span th:text="${o.payment.paymentMethod}">CREDIT_CARD</span>
                </div>
                <div class="small">
                    <span class="fw-600">Status:</span>
                    <span th:text="${o.payment.paymentStatus}">PAID</span>
                </div>
            </div>

            <div class="mt-5 d-flex gap-3 justify-content-end">
                <a th:href="@{/orders/{id}(id=${o.orderId})}" class="btn-ghost py-2">View Details</a>
                <form th:if="${status == 'PLACED' or status == 'CONFIRMED'}"
                    th:action="@{/orders/{id}/cancel(id=${o.orderId})}" method="post"
                    onsubmit="return confirm('Are you sure you want to cancel this order?')">
                    <button type="submit" class="btn-ghost text-danger py-2" style="border-color: #fee2e2;">Cancel Order</button>
                </form>
            </div>
        </div>
    </main>

    <footer th:replace="~{navbar :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
