<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product - RevShop</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 25px;
            margin-top: 40px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px gray;
        }

        input, textarea {
            width: 90%;
            padding: 8px;
            margin: 8px;
        }

        button {
            background-color: #007bff;
            color: white;
            padding: 10px;
            border: none;
            width: 95%;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Add Product</h2>

    <form action="/products/add" method="post">

        <input type="text" name="name" placeholder="Product Name" required>

        <textarea name="description" placeholder="Description"></textarea>

        <input type="number" step="0.01" name="price" placeholder="Price" required>

        <input type="number" step="0.01" name="discountPrice" placeholder="Discount Price">

        <input type="number" name="quantity" placeholder="Quantity" required>

        <!-- TEMP: manual IDs (later from login/session) -->
        <input type="number" name="sellerId" placeholder="Seller ID" required>

        <input type="number" name="categoryId" placeholder="Category ID" required>

        <button type="submit">Add Product</button>

    </form>

</div>

</body>
</html>
