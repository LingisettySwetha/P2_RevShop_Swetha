<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Your Cart - RevShop</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            text-align: center;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
            background: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
        }

        th {
            background-color: #28a745;
            color: white;
        }

        h2 {
            margin-top: 20px;
        }

        a {
            text-decoration: none;
            color: white;
            background: red;
            padding: 6px 10px;
            border-radius: 4px;
        }
    </style>
</head>

<body>

<h2>Your Shopping Cart</h2>

<table>
    <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Action</th>
    </tr>

    <tr th:each="item : ${cartItems}">
        <td th:text="${item.product.name}"></td>
        <td th:text="${item.product.price}"></td>
        <td th:text="${item.quantity}"></td>

        <td>
            <a th:href="@{'/cart/remove/' + ${item.cartItemId}}">
                Remove
            </a>
        </td>
    </tr>

</table>

</body>
</html>
