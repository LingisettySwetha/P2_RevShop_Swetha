<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Your Cart - RevShop</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .cart-item-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: var(--transition);
        }

        .cart-item-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #f1f5f9;
            padding: 0.5rem;
            border-radius: 12px;
            width: fit-content;
        }

        .qty-btn {
            background: white;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            transition: var(--transition);
            font-weight: bold;
        }

        .qty-btn:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
        }

        .qty-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .summary-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 2rem;
            position: sticky;
            top: 100px;
        }

        .checkout-step {
            display: none;
            margin-top: 2rem;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body style="background: var(--bg-main);">
    <div th:replace="navbar :: navbar"></div>

    <main class="container" style="padding: 4rem 1rem;">
        <h1 class="hero-title" style="text-align: left; font-size: 2.5rem;">Shopping <span
                style="font-weight: 300;">Cart</span></h1>

        <div th:if="${cartItems == null or #lists.isEmpty(cartItems)}" class="card-white text-center py-5">
            <div style="font-size: 4rem; margin-bottom: 1.5rem;">🛒</div>
            <h3 class="fw-bold mb-2">Your cart is empty</h3>
            <p class="text-muted mb-4">Looks like you haven't added anything yet. Start exploring our featured products!
            </p>
            <a href="/products" class="btn-premium px-5 py-3">Explore Products</a>
        </div>

        <div th:unless="${cartItems.empty}" class="row mt-4">
            
            <div class="col-lg-8">
                <div th:each="item : ${cartItems}"
                    class="cart-item-card d-flex align-items-center justify-content-between">
                    <div class="d-flex align-items-center gap-4">
                        <div
                            style="width: 80px; height: 80px; background: #f8fafc; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2rem;">
                            📦</div>
                        <div>
                            <h5 class="fw-bold mb-1" th:text="${item.product.name}">Product Name</h5>
                            <p class="text-muted small mb-0" th:text="${'Price: ₹' + item.product.price}">Price</p>
                        </div>
                    </div>

                    <div class="d-flex align-items-center gap-5">
                        <div class="qty-control">
                            <form th:action="@{'/cart/update/' + ${item.cartItemId}}" method="post">
                                <input type="hidden" name="quantity" th:value="${item.quantity - 1}">
                                <button type="submit" class="qty-btn" th:disabled="${item.quantity <= 1}">−</button>
                            </form>
                            <span class="fw-bold" th:text="${item.quantity}"
                                style="min-width: 24px; text-align: center;">1</span>
                            <form th:action="@{'/cart/update/' + ${item.cartItemId}}" method="post">
                                <input type="hidden" name="quantity" th:value="${item.quantity + 1}">
                                <button type="submit" class="qty-btn">+</button>
                            </form>
                        </div>

                        <div class="text-end" style="min-width: 100px;">
                            <div class="fw-800 text-main" style="font-size: 1.25rem;"
                                th:text="${'₹' + (item.product.price * item.quantity)}">0.00</div>
                            <a th:href="@{'/cart/remove/' + ${item.cartItemId}}" class="text-danger small fw-600"
                                style="text-decoration: none;">Remove</a>
                        </div>
                    </div>
                </div>
            </div>

            
            <div class="col-lg-4">
                <div class="summary-card">
                    <h5 class="fw-bold mb-4">Order Summary</h5>
                    <div class="d-flex justify-content-between mb-3 text-muted">
                        <span>Subtotal</span>
                        <span th:text="${'₹' + #aggregates.sum(cartItems.![product.price * quantity])}">₹0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3 text-muted">
                        <span>Shipping</span>
                        <span class="text-success fw-bold">FREE</span>
                    </div>
                    <hr class="my-4" style="opacity: 0.1;">
                    <div class="d-flex justify-content-between mb-5">
                        <span class="fw-bold">Total Amount</span>
                        <span class="fw-800 text-primary" style="font-size: 1.5rem;"
                            th:text="${'₹' + #aggregates.sum(cartItems.![product.price * quantity])}">₹0.00</span>
                    </div>

                    <a href="/checkout" class="btn-premium w-100 py-3 text-center"
                        style="text-decoration: none;">Proceed to Checkout &rarr;</a>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{navbar :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
