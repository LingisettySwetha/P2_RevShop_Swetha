<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Forgot Password - RevShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--bg-main) 100%);
        }

        .auth-card {
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 520px;
            padding: 3rem;
        }
    </style>
</head>

<body>
<div class="auth-container">
    <div class="auth-card">
        <h2 class="fw-bold mb-2">Forgot Password</h2>
        <p class="text-muted small mb-4">Enter your email to generate a recovery link.</p>

        <div th:if="${success}" class="alert alert-success py-2 px-3 small" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger py-2 px-3 small" th:text="${error}"></div>

        <div th:if="${devResetLink}" class="alert alert-warning py-2 px-3 small">
            <div class="fw-bold">Development reset link:</div>
            <a th:href="${devResetLink}" th:text="${devResetLink}">/reset-password</a>
        </div>

        <form action="/forgot-password" method="post">
            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-input" required>
            </div>
            <button type="submit" class="btn-premium w-100 py-3">Generate Reset Link</button>
        </form>

        <div class="text-center mt-4">
            <a href="/login" class="text-primary small" style="text-decoration: none;">Back to Login</a>
        </div>
    </div>
</div>
</body>

</html>
