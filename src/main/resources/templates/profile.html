<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Profile - RevShop</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .profile-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #6366f1);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 auto 1.5rem;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3);
        }

        .profile-card {
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            box-shadow: var(--shadow-sm);
            margin-bottom: 2rem;
        }

        .profile-card h3 {
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .profile-card .section-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.95rem;
            transition: var(--transition);
            background: #fafbfc;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            background: white;
        }

        .form-group input:disabled {
            background: #f1f5f9;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            background: #f8fafc;
            border-radius: 10px;
            margin-bottom: 0.75rem;
        }

        .info-row .info-label {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            min-width: 100px;
        }

        .info-row .info-value {
            font-weight: 500;
            color: var(--text-main);
        }

        .role-badge {
            padding: 0.35rem 1rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .role-badge-user {
            background: #eff6ff;
            color: #3b82f6;
        }

        .role-badge-seller {
            background: #fef3c7;
            color: #d97706;
        }

        .role-badge-admin {
            background: #fce7f3;
            color: #db2777;
        }

        .alert-success-custom {
            background: #ecfdf5;
            color: #059669;
            border: 1px solid #a7f3d0;
            border-radius: 10px;
            padding: 1rem 1.5rem;
            font-weight: 500;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .alert-error-custom {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 1rem 1.5rem;
            font-weight: 500;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 2rem 0;
        }

        .password-section {
            background: #fafbfc;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px dashed var(--border-color);
        }
    </style>
</head>

<body style="background: var(--bg-main);">
    <div th:replace="navbar :: navbar"></div>

    <div class="profile-wrapper">
        
        <div class="profile-header">
            <div class="profile-avatar"
                th:text="${user.name != null and !#strings.isEmpty(user.name) ? #strings.substring(user.name, 0, 1).toUpperCase() : 'U'}">
                U</div>
            <h1 class="fw-bold mb-1" th:text="${user.name}">User Name</h1>
            <p class="text-muted mb-2" th:text="${user.email}">email@example.com</p>
            <span class="role-badge"
                th:classappend="${user.role == 'ADMIN' ? 'role-badge-admin' : (user.role == 'SELLER' ? 'role-badge-seller' : 'role-badge-user')}"
                th:text="${user.role}">USER</span>
        </div>

        
        <div th:if="${success}" class="alert-success-custom">
            <span>✅</span>
            <span th:text="${success}">Success</span>
        </div>
        <div th:if="${error}" class="alert-error-custom">
            <span>❌</span>
            <span th:text="${error}">Error</span>
        </div>

        
        <div class="profile-card">
            <h3>Account Information</h3>
            <p class="section-desc">Your account details and membership info</p>

            <div class="info-row">
                <span class="info-label">User ID</span>
                <span class="info-value" th:text="${'#UID-' + user.userId}">ID</span>
            </div>
            <div class="info-row">
                <span class="info-label">Role</span>
                <span class="info-value" th:text="${user.role}">Role</span>
            </div>
            <div class="info-row">
                <span class="info-label">Member Since</span>
                <span class="info-value"
                    th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'dd MMMM yyyy') : 'N/A'}">Date</span>
            </div>
        </div>

        
        <div class="profile-card">
            <h3>Edit Profile</h3>
            <p class="section-desc">Update your personal information</p>

            <form th:action="@{/profile/update}" method="post">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" name="name" th:value="${user.name}" placeholder="Your full name"
                                required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" name="email" th:value="${user.email}" placeholder="Your email" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" th:value="${user.phone}" placeholder="Your phone number">
                </div>

                <hr class="divider">

                
                <div class="password-section">
                    <h6 class="fw-bold mb-1">Change Password</h6>
                    <p class="text-muted small mb-3">Leave blank if you don't want to change your password</p>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Current Password</label>
                                <input type="password" name="currentPassword" placeholder="Enter current password">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>New Password</label>
                                <input type="password" name="newPassword" placeholder="Enter new password">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn-premium px-5 py-3">Save Changes</button>
                    <a th:href="@{/home}" class="btn-ghost px-5 py-3">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <footer th:replace="~{navbar :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
