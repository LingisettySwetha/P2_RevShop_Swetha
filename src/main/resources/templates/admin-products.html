<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Manage Products - RevShop Admin</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .dashboard-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
            flex-shrink: 0;
            position: sticky;
            top: 72px;
            height: calc(100vh - 72px);
        }

        .main-content {
            flex-grow: 1;
            padding: 3rem;
            background: var(--bg-main);
        }

        .nav-link-custom {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 10px;
            transition: var(--transition);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .nav-link-custom:hover,
        .nav-link-custom.active {
            background: var(--primary-light);
            color: var(--primary);
        }

        .table-premium {
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .table-premium th {
            background: #f8fafc;
            padding: 1.25rem 1.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
        }

        .table-premium td {
            padding: 1.25rem 1.5rem;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
        }
    </style>
</head>

<body style="background: var(--bg-main);">
    <div th:replace="navbar :: navbar"></div>

    <div class="dashboard-wrapper">
        
        <aside class="sidebar d-none d-lg-block">
            <div class="mb-5 px-3">
                <h6 class="text-muted small fw-bold text-uppercase mb-4">Administration</h6>
                <nav>
                    <a th:href="@{/admin/dashboard}" class="nav-link-custom">
                        <span>📊</span> Overview
                    </a>
                    <a th:href="@{/admin/products}" class="nav-link-custom active">
                        <span>📦</span> All Products
                    </a>
                </nav>
            </div>
        </aside>

        
        <main class="main-content">
            <header class="d-flex justify-content-between align-items-end mb-5">
                <div>
                    <h1 class="fw-bold mb-1">Global Inventory</h1>
                    <p class="text-muted mb-0">Monitor and manage all products across RevShop</p>
                </div>
                <a th:href="@{/admin/products/add}" class="btn-premium py-2 px-4 shadow-sm">+ Add Global Product</a>
            </header>

            <div class="table-premium">
                <div class="table-responsive">
                    <table class="w-100">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Product Details</th>
                                <th>Category</th>
                                <th>Seller</th>
                                <th>Price</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${products}">
                                <td class="text-muted small" th:text="${'#PID-' + p.productId}">ID</td>
                                <td>
                                    <div class="fw-bold text-main" th:text="${p.name}">Product Name</div>
                                    <div class="text-muted tiny" th:text="${#strings.abbreviate(p.description, 50)}">
                                        Desc</div>
                                </td>
                                <td>
                                    <span class="badge bg-light text-muted fw-600"
                                        th:text="${p.category.categoryName}">Category</span>
                                </td>
                                <td>
                                    <div class="d-flex align-items-center gap-2">
                                        <div style="width: 24px; height: 24px; background: var(--primary-light); color: var(--primary); border-radius: 100px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold;"
                                            th:text="${#strings.substring(p.seller.name, 0, 1)}">S</div>
                                        <span class="small fw-500" th:text="${p.seller.name}">Seller</span>
                                    </div>
                                </td>
                                <td class="fw-bold" th:text="${'₹' + p.price}">Price</td>
                                <td class="text-end">
                                    <div class="d-flex justify-content-end gap-2">
                                        <a th:href="@{/admin/products/edit/{id}(id=${p.productId})}" class="btn-ghost"
                                            style="padding: 0.4rem 0.8rem; font-size: 0.8rem; border-radius: 8px;">Edit</a>
                                        <a th:href="@{/admin/products/delete/{id}(id=${p.productId})}" class="btn-ghost"
                                            style="padding: 0.4rem 0.8rem; font-size: 0.8rem; border-radius: 8px; border-color: var(--error); color: var(--error);"
                                            onclick="return confirm('Are you sure you want to remove this product globally?')">Delete</a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
