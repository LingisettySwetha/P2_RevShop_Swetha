<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Admin Product Management</h2>

<a href="/admin/products/add" class="btn btn-success mb-3">
    Add Product
</a>

<table class="table table-bordered">

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Price</th>
        <th>Seller</th>
        <th>Category</th>
        <th>Actions</th>
    </tr>

    <tr th:each="p : ${products}">
        <td th:text="${p.productId}"></td>
        <td th:text="${p.name}"></td>
        <td th:text="${p.price}"></td>
        <td th:text="${p.seller.name}"></td>
        <td th:text="${p.category.name}"></td>

        <td>
            <a th:href="@{/admin/products/edit/{id}(id=${p.productId})}"
               class="btn btn-warning btn-sm">Edit</a>

            <a th:href="@{/admin/products/delete/{id}(id=${p.productId})}"
               class="btn btn-danger btn-sm">Delete</a>
        </td>
    </tr>

</table>

</body>
</html>
