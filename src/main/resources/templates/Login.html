<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Secure Login - RevShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--bg-main) 100%);
        }

        .auth-card {
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 450px;
            padding: 3rem;
        }

        .auth-logo {
            font-size: 2rem;
            color: var(--primary);
            text-align: center;
            margin-bottom: 2rem;
            text-decoration: none;
            display: block;
        }
    </style>
</head>

<body class="bg-light">

    <div class="auth-container">
        <div class="auth-card">

            <a href="/" class="auth-logo fw-bold brand">🛒 RevShop</a>

            <div class="text-center mb-5">
                <h2 class="fw-bold mb-2">Welcome Back</h2>
                <p class="text-muted small">Please enter your details to sign in</p>
            </div>

            <div id="errorMsg" class="alert alert-danger d-none p-2 mb-4 text-center small" style="border-radius: 8px;">
            </div>
            <div id="successMsg" class="alert alert-success d-none p-2 mb-4 text-center small"
                style="border-radius: 8px;"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input class="form-input" id="email" name="email" type="email" placeholder="e.g. alex@example.com"
                        required>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label class="form-label mb-0">Password</label>
                        <a href="/forgot-password" class="text-primary small" style="text-decoration: none;">Forgot?</a>
                    </div>
                    <input type="password" class="form-input" id="password" name="password" placeholder="••••••••"
                        required>
                </div>

                <button type="submit" class="btn-premium w-100 py-3">Sign In &rarr;</button>
            </form>

            <div class="text-center mt-5">
                <p class="text-muted small">
                    Don't have an account?
                    <a href="/register" class="text-primary fw-bold" style="text-decoration: none;">Create one for
                        free</a>
                </p>
            </div>

        </div>
    </div>

    <script th:src="@{/js/login.js}"></script>

</body>

</html>
