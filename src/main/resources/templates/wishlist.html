<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Wishlist</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4 text-center">❤️ My Wishlist</h2>

    <div th:if="${#lists.isEmpty(wishlist)}"
         class="alert alert-info text-center">
        Your wishlist is empty.
    </div>

    <div class="row">

        <div class="col-md-4 mb-4"
             th:each="item : ${wishlist}">

            <div class="card shadow h-100">

                <div class="card-body">

                    <h5 class="card-title"
                        th:text="${item.product.name}">
                    </h5>

                    <p class="card-text">
                        ₹ <span th:text="${item.product.price}"></span>
                    </p>

                    <p>
                        Category:
                        <span th:text="${item.product.category.name}"></span>
                    </p>

                    
                    <form action="/cart/add"
                          method="post">

                        <input type="hidden"
                               name="productId"
                               th:value="${item.product.productId}">

                        <button class="btn btn-primary btn-sm">
                            Add to Cart
                        </button>
                    </form>

                   
                    <a th:href="@{/wishlist/remove/{id}(id=${item.wishlistId})}"
                       class="btn btn-danger btn-sm mt-2">
                        Remove
                    </a>

                </div>

            </div>

        </div>

    </div>

    <div class="text-center mt-4">
        <a href="/products" class="btn btn-outline-dark">
            Continue Shopping
        </a>
    </div>

</div>

</body>
</html>
