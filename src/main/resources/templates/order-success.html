<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Order Confirmed - RevShop</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .success-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .success-card {
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            padding: 4rem;
            text-align: center;
            max-width: 550px;
            box-shadow: var(--shadow-lg);
        }

        .check-icon {
            width: 80px;
            height: 80px;
            background: #dcfce7;
            color: #166534;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border-radius: 100px;
            margin: 0 auto 2rem;
            animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes scaleUp {
            from {
                transform: scale(0.5);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body style="background: var(--bg-main);">
    <div th:replace="navbar :: navbar"></div>

    <div class="success-container">
        <div class="success-card">
            <div class="check-icon">✓</div>
            <h1 class="fw-800 mb-3">Order Placed!</h1>
            <p class="text-muted mb-5">Thank you for your purchase. We've received your order and our team is already
                preparing it for delivery.</p>

            <div class="d-grid gap-3">
                <a href="/orders" class="btn-premium py-3">View My Orders</a>
                <a href="/products" class="btn-ghost py-3">Continue Shopping</a>
            </div>

            <p class="text-muted small mt-5">A confirmation email with your order details has been sent.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
