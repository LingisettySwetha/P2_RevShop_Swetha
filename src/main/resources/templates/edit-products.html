<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="container mt-5">
<h2>Edit Product</h2>
<form action="/admin/products/save" method="post" th:object="${product}">
<input type="hidden" th:field="*{productId}">



    <div class="mb-3">
        <label>Name</label>
        <input type="text"
               th:field="*{name}"
               class="form-control"
               required>
    </div>

    <div class="mb-3">
        <label>Description</label>
        <textarea th:field="*{description}"
                  class="form-control"></textarea>
    </div>

    <div class="mb-3">
        <label>Price</label>
        <input type="number"
               th:field="*{price}"
               class="form-control"
               required>
    </div>

    <div class="mb-3">
        <label>Quantity</label>
        <input type="number"
               th:field="*{quantity}"
               class="form-control"
               required>
    </div>

    <button class="btn btn-primary">
        Update Product
    </button>

    <a href="/admin/products"
       class="btn btn-secondary">
        Cancel
    </a>

</form>

</body>
</html>
