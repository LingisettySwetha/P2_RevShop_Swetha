<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-primary px-4">
    <a class="navbar-brand" href="/">RevShop</a>

    <div>
        <a href="/orders" class="btn btn-light">Back to Orders</a>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="text-center mb-4">
        Order Details - #<span th:text="${orderId}"></span>
    </h2>

    <table class="table table-bordered shadow">

        <thead class="table-dark">
        <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="item : ${orderItems}">
            <td th:text="${item.product.name}"></td>

            <td>
                Rs <span th:text="${item.price}"></span>
            </td>

            <td th:text="${item.quantity}"></td>

            <td>
                Rs
                <span th:text="${item.price * item.quantity}"></span>
            </td>

            <td>
                <a th:href="@{/products/{id}(id=${item.product.productId})}"
                   class="btn btn-sm btn-outline-primary">
                    View Details
                </a>
            </td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
