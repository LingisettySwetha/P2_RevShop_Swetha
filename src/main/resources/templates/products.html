<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Explore Collection - RevShop</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .filter-sidebar {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 2rem;
            position: sticky;
            top: 100px;
        }

        .search-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: white;
            padding: 1rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .product-image {
            aspect-ratio: 1;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .price-tag {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--text-main);
            margin: 0.5rem 0 1rem;
        }

        .rating-chip {
            background: #fef3c7;
            color: #92400e;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            width: fit-content;
        }
    </style>
</head>

<body style="background: var(--bg-main);">
    <div th:replace="navbar :: navbar"></div>

    <main class="container" style="padding: 4rem 1.5rem; max-width: 1400px;">
        <div class="row">
            
            <div class="col-12 mb-4">
                <div class="d-flex justify-content-between align-items-end flex-wrap gap-4">
                    <div>
                        <h1 class="hero-title mb-1" style="font-size: 2.5rem; text-align: left;">Premium <span
                                style="font-weight: 300;">Collection</span></h1>
                        <p class="text-muted mb-0">Discover our handpicked selection of exceptional products.</p>
                    </div>

                    <form th:action="@{/products}" method="get" class="search-container mb-0" style="min-width: 400px;">
                        <input type="text" name="keyword" th:value="${keyword}" class="form-input mb-0"
                            placeholder="Search for anything..." style="border: none; background: transparent;">
                        <input type="hidden" name="category" th:value="${selectedCategory}">
                        <button type="submit" class="btn-premium px-4">Search</button>
                    </form>
                </div>
            </div>

            <hr class="mb-5" style="opacity: 0.05;">

            
            <aside class="col-lg-3">
                <div class="filter-sidebar">
                    <h5 class="mb-4 fw-800">Filter by Category</h5>
                    <div class="d-flex flex-column gap-2">
                        <a th:href="@{/products(keyword=${keyword}, category='')}"
                            class="btn-ghost text-start py-2 px-3"
                            th:classappend="${selectedCategory == null || selectedCategory == '' ? 'bg-primary text-white border-primary' : ''}"
                            style="border-radius: 8px;">
                            All Collection
                        </a>
                        <a th:each="cat : ${categories}"
                            th:href="@{/products(keyword=${keyword}, category=${cat.categoryId})}"
                            class="btn-ghost text-start py-2 px-3"
                            th:classappend="${cat.categoryId == selectedCategory ? 'bg-primary text-white border-primary' : ''}"
                            style="border-radius: 8px;">
                            <span th:text="${cat.categoryName}">Category</span>
                        </a>
                    </div>
                </div>
            </aside>

            
            <div class="col-lg-9">
                <div th:if="${products.empty}" class="card-white text-center py-5">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">🔍</div>
                    <h3 class="text-muted fw-bold">No results found</h3>
                    <p class="text-muted mb-4">Try different keywords or browse other categories.</p>
                    <a href="/products" class="btn-premium">Clear All Filters</a>
                </div>

                <div class="product-grid">
                    <div th:each="product : ${products}" class="product-card">
                        <div class="product-image">
                            <img th:if="${product.imageUrl != null}"
                                 th:src="@{${#strings.startsWith(product.imageUrl,'/') ? product.imageUrl : '/uploads/images/' + product.imageUrl}}"
                                 alt="Product image">
                            <span th:if="${product.imageUrl == null}" style="font-size: 1rem;">No Image</span>
                        </div>
                        <div class="product-info">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="mb-0 fw-bold" th:text="${product.name}">Product Name</h5>
                                <form th:if="${session.role == 'BUYER'}"
                                    th:action="@{/wishlist/add/{id}(id=${product.productId})}" method="post">
                                    <button type="submit"
                                        style="background:none; border:none; font-size: 1.2rem; cursor: pointer;">❤️</button>
                                </form>
                            </div>
                            <p class="text-muted small mb-3"
                                th:text="${product.description != null ? #strings.abbreviate(product.description, 80) : 'No description available'}">
                                Description</p>

                            <div class="mt-auto">
                                <div class="rating-chip mb-2">
                                    ⭐ <span
                                        th:text="${product.reviews != null and !#lists.isEmpty(product.reviews) ? #numbers.formatDecimal(#aggregates.avg(product.reviews.![rating]), 1, 1) : '5.0'}">5.0</span>
                                </div>
                                <div class="price-tag">₹<span th:text="${product.price}">0.00</span></div>

                                <div class="d-grid gap-2">
                                    <form th:if="${session.role == 'BUYER'}" action="/cart/add" method="post">
                                        <input type="hidden" name="productId" th:value="${product.productId}">
                                        <button class="btn-premium w-100 py-2">Add to Cart</button>
                                    </form>
                                    <a th:href="@{'/products/' + ${product.productId}}"
                                        class="btn-ghost text-center py-2" style="font-size: 0.85rem;">View Details</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{navbar :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
