<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Category - RevShop Admin</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .dashboard-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
            flex-shrink: 0;
            position: sticky;
            top: 72px;
            height: calc(100vh - 72px);
        }

        .main-content {
            flex-grow: 1;
            padding: 3rem;
            background: var(--bg-main);
        }

        .nav-link-custom {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 10px;
            transition: var(--transition);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .nav-link-custom:hover,
        .nav-link-custom.active {
            background: var(--primary-light);
            color: var(--primary);
        }

        .form-card {
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            padding: 3rem;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: var(--shadow-sm);
        }
    </style>
</head>

<body style="background: var(--bg-main);">
    <div th:replace="navbar :: navbar"></div>

    <div class="dashboard-wrapper">
        
        <aside class="sidebar d-none d-lg-block">
            <div class="mb-5 px-3">
                <h6 class="text-muted small fw-bold text-uppercase mb-4">Administration</h6>
                <nav>
                    <a th:href="@{/admin/dashboard}" class="nav-link-custom">
                        <span>📊</span> Overview
                    </a>
                    <a th:href="@{/admin/products}" class="nav-link-custom">
                        <span>📦</span> All Products
                    </a>
                    <a th:href="@{/admin/categories}" class="nav-link-custom active">
                        <span>📂</span> Categories
                    </a>
                </nav>
            </div>
        </aside>

        
        <main class="main-content">
            <header class="mb-5">
                <a th:href="@{/admin/categories}" class="text-primary small fw-600 mb-2 d-inline-block"
                    style="text-decoration: none;">&larr; Back to Categories</a>
                <h1 class="fw-bold mb-1">Edit Category</h1>
                <p class="text-muted mb-0">Update category details for RevShop</p>
            </header>

            <div class="form-card">
                <form th:action="@{'/admin/categories/update/' + ${category.categoryId}}" th:object="${category}"
                    method="post">
                    <input type="hidden" th:field="*{categoryId}">
                    <div class="mb-4">
                        <label class="form-label">Category Name</label>
                        <input type="text" th:field="*{categoryName}" class="form-input" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Description</label>
                        <textarea th:field="*{description}" class="form-input" style="height: 120px;"></textarea>
                    </div>

                    <div class="d-flex gap-3 mt-4">
                        <button type="submit" class="btn-premium px-5 py-3">Update Category &rarr;</button>
                        <a th:href="@{/admin/categories}" class="btn-ghost px-5 py-3">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
