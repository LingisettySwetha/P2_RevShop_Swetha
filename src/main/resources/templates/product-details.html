<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="${product.name + ' - RevShop'}"></title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-hero {
            background: white;
            border-bottom: 1px solid var(--border-color);
            padding: 5rem 0;
        }

        .detail-image {
            background: #f8fafc;
            border-radius: var(--radius-lg);
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8rem;
            border: 1px solid var(--border-color);
        }

        .detail-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius-lg);
        }

        .review-card {
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 0;
        }
    </style>
</head>

<body style="background: var(--bg-main);">
    <div th:replace="~{navbar :: navbar}"></div>

    <main>
        <div class="product-hero">
            <div class="container">
                <div class="row g-5 align-items-center">
                    <div class="col-md-6">
                        <div class="detail-image">
                            <img th:if="${product.imageUrl != null}"
                                 th:src="@{${#strings.startsWith(product.imageUrl,'/') ? product.imageUrl : '/uploads/images/' + product.imageUrl}}"
                                 alt="Product image">
                            <span th:if="${product.imageUrl == null}" style="font-size: 1rem;">No Image</span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <nav aria-label="breadcrumb" class="mb-4">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item"><a href="/products" class="text-primary">All Products</a>
                                </li>
                                <li class="breadcrumb-item active" th:text="${product.category.categoryName}">Category
                                </li>
                            </ol>
                        </nav>
                        <h1 class="display-4 fw-bold mb-3" th:text="${product.name}">Product Name</h1>
                        <div class="d-flex align-items-center gap-3 mb-4">
                            <div class="badge bg-warning text-dark px-3 py-2 fw-bold" style="font-size: 1rem;">
                                ⭐ <span
                                    th:text="${product.reviews != null and !#lists.isEmpty(product.reviews) ? #numbers.formatDecimal(#aggregates.avg(product.reviews.![rating]), 1, 1) : '5.0'}">5.0</span>
                            </div>
                            <span class="text-muted fw-500"
                                th:text="${(product.reviews != null ? product.reviews.size() : 0) + ' Reviews'}">0
                                Reviews</span>
                        </div>
                        <h2 class="text-primary fw-800 mb-4" th:text="'₹' + ${product.price}">₹0.00</h2>
                        <p class="text-muted lead mb-5" th:text="${product.description}">Extraordinary description of
                            this premium product.</p>

                        <div class="d-grid gap-3" style="max-width: 300px;">
                            <form th:if="${session.role == 'BUYER'}" action="/cart/add" method="post">
                                <input type="hidden" name="productId" th:value="${product.productId}">
                                <button class="btn-premium w-100 py-3">Add to Cart</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <section class="container py-5">
            <h3 class="fw-bold mb-5">Customer Reviews</h3>

            <div th:if="${success}" class="alert alert-success mb-4" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger mb-4" th:text="${error}"></div>

            <div th:if="${session.role == 'BUYER'}" class="card-white mb-4" style="padding: 1.5rem;">
                <h5 class="fw-bold mb-3">Write a Review</h5>
                <form action="/reviews/add" method="post">
                    <input type="hidden" name="productId" th:value="${product.productId}">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">Rating</label>
                            <select name="rating" class="form-input" required>
                                <option value="">Select</option>
                                <option value="5">5 - Excellent</option>
                                <option value="4">4 - Good</option>
                                <option value="3">3 - Average</option>
                                <option value="2">2 - Poor</option>
                                <option value="1">1 - Bad</option>
                            </select>
                        </div>
                        <div class="col-md-9">
                            <label class="form-label">Comment</label>
                            <textarea name="comment" class="form-input" rows="3" placeholder="Share your experience..." required></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn-premium mt-3">Submit Review</button>
                </form>
            </div>

            <div th:if="${product.reviews == null or #lists.isEmpty(product.reviews)}"
                class="text-center py-5 card-white">
                <p class="text-muted mb-0">No reviews yet. Be the first to share your thoughts!</p>
            </div>

            <div th:each="r : ${product.reviews}" class="review-card">
                <div class="d-flex justify-content-between mb-2">
                    <h6 class="fw-bold mb-0" th:text="${r.user.name}">User</h6>
                    <span class="text-warning fw-bold" th:text="'⭐ ' + ${r.rating}">⭐ 5</span>
                </div>
                <p class="text-muted mb-0" th:text="${r.comment}">Great product!</p>
            </div>
        </section>
    </main>

    <footer th:replace="~{home :: footer}"></footer>
</body>

</html>
