<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Checkout - RevShop</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .checkout-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 1rem;
        }

        .payment-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 3rem;
            box-shadow: var(--shadow-lg);
        }

        .order-summary-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 2rem;
            position: sticky;
            top: 100px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .summary-item:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body style="background: var(--bg-main);">
    <div th:replace="navbar :: navbar"></div>

    <main class="checkout-wrapper">
        <div class="mb-4">
            <a th:href="@{/cart}" class="text-decoration-none text-muted small fw-bold">
                &larr; Back to Cart
            </a>
        </div>

        <div class="text-center mb-5">
            <h1 class="fw-bold mb-2">Checkout</h1>
            <p class="text-muted">Choose payment method and place your order</p>
        </div>

        <div class="row">
            <div class="col-lg-5 order-lg-2 mb-4">
                <div class="order-summary-card">
                    <h5 class="fw-bold mb-4">Order Summary</h5>

                    <div th:each="item : ${cartItems}" class="summary-item">
                        <div>
                            <div class="fw-600 small" th:text="${item.product.name}">Product</div>
                            <div class="text-muted tiny" th:text="${'Qty: ' + item.quantity}">Qty</div>
                        </div>
                        <div class="fw-bold" th:text="${'Rs ' + (item.product.price * item.quantity)}">Rs 0</div>
                    </div>

                    <hr class="my-3" style="opacity: 0.1;">
                    <div class="d-flex justify-content-between mb-2 text-muted small">
                        <span>Shipping</span>
                        <span class="text-success fw-bold">FREE</span>
                    </div>
                    <div class="d-flex justify-content-between">
                        <span class="fw-bold">Total</span>
                        <span class="fw-800 text-primary" style="font-size: 1.35rem;"
                            th:text="${'Rs ' + cartTotal}">Rs 0</span>
                    </div>
                </div>
            </div>

            <div class="col-lg-7 order-lg-1">
                <div class="payment-card">
                    <form action="/orders/checkout" method="post">
                        <div class="mb-4">
                            <label class="form-label">Shipping Address</label>
                            <textarea name="address" class="form-input" rows="3"
                                placeholder="Enter your full delivery address..." required></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Payment Method</label>
                            <select name="paymentMethod" id="paymentMethod" class="form-input" required>
                                <option value="CREDIT_CARD">Credit Card</option>
                                <option value="DEBIT_CARD">Debit Card</option>
                                <option value="CASH_ON_DELIVERY">Cash on Delivery</option>
                            </select>
                        </div>

                        <div id="cardDetailsSection">
                            <div class="mb-4">
                                <label class="form-label">Card Type</label>
                                <input type="text" name="cardType" id="cardType" class="form-input"
                                    placeholder="e.g. SBI ">
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Name on Card</label>
                                <input type="text" name="cardHolderName" id="cardHolderName" class="form-input"
                                    placeholder="e.g. John Doe">
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Card Number</label>
                                <input type="text" name="cardNumber" id="cardNumber" class="form-input"
                                    placeholder="0000 0000 0000 0000" maxlength="19">
                            </div>

                            <div class="row">
                                <div class="col-md-7 mb-4">
                                    <label class="form-label">Expiry Date</label>
                                    <input type="text" name="expiryDate" id="expiryDate" class="form-input"
                                        placeholder="MM/YY" maxlength="5">
                                </div>
                                <div class="col-md-5 mb-4">
                                    <label class="form-label">CVV</label>
                                    <input type="password" name="cvv" id="cvv" class="form-input" placeholder="***"
                                        maxlength="3">
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn-premium w-100 py-3" id="submitButton">
                            Pay and Place Order
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        const paymentMethodEl = document.getElementById("paymentMethod");
        const cardDetailsSectionEl = document.getElementById("cardDetailsSection");
        const submitButtonEl = document.getElementById("submitButton");
        const cardTypeEl = document.getElementById("cardType");
        const cardHolderNameEl = document.getElementById("cardHolderName");
        const cardNumberEl = document.getElementById("cardNumber");
        const expiryDateEl = document.getElementById("expiryDate");
        const cvvEl = document.getElementById("cvv");

        function toggleCardFields() {
            const isCardPayment = paymentMethodEl.value === "CREDIT_CARD" || paymentMethodEl.value === "DEBIT_CARD";
            cardDetailsSectionEl.style.display = isCardPayment ? "block" : "none";
            cardTypeEl.required = isCardPayment;
            cardHolderNameEl.required = isCardPayment;
            cardNumberEl.required = isCardPayment;
            expiryDateEl.required = isCardPayment;
            cvvEl.required = isCardPayment;
            submitButtonEl.textContent = isCardPayment ? "Pay and Place Order" : "Place Order (Cash on Delivery)";
        }

        paymentMethodEl.addEventListener("change", toggleCardFields);
        toggleCardFields();
    </script>
</body>

</html>
