<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Secure Checkout - RevShop</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .checkout-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 1rem;
        }

        .payment-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 3rem;
            box-shadow: var(--shadow-lg);
        }

        .payment-icons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .payment-icon {
            width: 48px;
            height: 32px;
            background: #f1f5f9;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: #64748b;
            border: 1px solid #e2e8f0;
        }

        .order-summary-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 2rem;
            position: sticky;
            top: 100px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .summary-item:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body style="background: var(--bg-main);">
    <div th:replace="navbar :: navbar"></div>

    <main class="checkout-wrapper">
        <div class="mb-4">
            <a th:href="@{/cart}" class="text-decoration-none text-muted small fw-bold">
                &larr; Back to Cart
            </a>
        </div>

        <div class="text-center mb-5">
            <h1 class="fw-bold mb-2">Secure Payment</h1>
            <p class="text-muted">Complete your order with our encrypted payment gateway</p>
        </div>

        <div class="row">
            
            <div class="col-lg-5 order-lg-2 mb-4">
                <div class="order-summary-card">
                    <h5 class="fw-bold mb-4">Order Summary</h5>

                    <div th:each="item : ${cartItems}" class="summary-item">
                        <div>
                            <div class="fw-600 small" th:text="${item.product.name}">Product</div>
                            <div class="text-muted tiny" th:text="${'Qty: ' + item.quantity}">Qty</div>
                        </div>
                        <div class="fw-bold" th:text="${'₹' + (item.product.price * item.quantity)}">₹0</div>
                    </div>

                    <hr class="my-3" style="opacity: 0.1;">
                    <div class="d-flex justify-content-between mb-2 text-muted small">
                        <span>Shipping</span>
                        <span class="text-success fw-bold">FREE</span>
                    </div>
                    <div class="d-flex justify-content-between">
                        <span class="fw-bold">Total</span>
                        <span class="fw-800 text-primary" style="font-size: 1.35rem;"
                            th:text="${'₹' + cartTotal}">₹0</span>
                    </div>
                </div>
            </div>

            
            <div class="col-lg-7 order-lg-1">
                <div class="payment-card">
                    <div class="payment-icons">
                        <div class="payment-icon">VISA</div>
                        <div class="payment-icon" style="color: #ea580c;">MASTER</div>
                        <div class="payment-icon" style="color: #2563eb;">AMEX</div>
                        <div class="payment-icon">UPI</div>
                    </div>

                    <form action="/orders/checkout" method="post">
                        <input type="hidden" name="paymentMethod" value="CARD">
                        <div class="mb-4">
                            <label class="form-label">Shipping Address</label>
                            <textarea name="address" class="form-input" rows="3"
                                placeholder="Enter your full delivery address..." required></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Name on Card</label>
                            <input type="text" class="form-input" placeholder="e.g. Johnathan Doe" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Card Number</label>
                            <div style="position: relative;">
                                <input type="text" name="cardNumber" class="form-input" placeholder="0000 0000 0000 0000" maxlength="19"
                                    required style="padding-right: 3rem;">
                                <span
                                    style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); opacity: 0.3;">🔒</span>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-7 mb-4">
                                <label class="form-label">Expiry Date</label>
                                <input type="text" name="expiryDate" class="form-input" placeholder="MM / YY" maxlength="5" required>
                            </div>
                            <div class="col-md-5 mb-4">
                                <label class="form-label">CVV</label>
                                <input type="password" name="cvv" class="form-input" placeholder="•••" maxlength="3" required>
                            </div>
                        </div>

                        <div class="mb-5 d-flex align-items-center gap-2">
                            <input type="checkbox" id="saveCard" checked
                                style="width: 16px; height: 16px; cursor: pointer;">
                            <label for="saveCard" class="text-muted small" style="cursor: pointer;">Save this card for
                                future premium purchases</label>
                        </div>

                        <button type="submit" class="btn-premium w-100 py-3">
                            Pay <span th:text="${'₹' + cartTotal}">₹0</span> &rarr;
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="tiny text-muted">
                            Your payment details are 100% secure. We never store your full card information.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
